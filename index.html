<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Captain's Log</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* LCARS Color Palette & Reset */
        :root { 
            --orange: #ff9900; --pink: #cc99cc; --blue: #9999ff; 
            --gold: #ffcc66; --red: #cc0000; --dark-blue: #08081a; --teal: #33cccc;
            --lcars-bg: #000000;
        }
        
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        input, textarea { user-select: text; -webkit-user-select: text; }

        body { 
            margin: 0; padding: 0; background: var(--lcars-bg); 
            font-family: 'Oswald', sans-serif; 
            font-weight: 500; text-transform: uppercase; color: white; 
            overflow: hidden; touch-action: none;
        }

        #root { height: 100vh; display: flex; flex-direction: column; }

        /* LCARS Main Layout */
        .lcars-container {
            display: grid; 
            grid-template-rows: 100px 1fr 40px;
            height: 100%; width: 100%; padding: 10px; gap: 10px;
        }

        /* Header / Top Elbow */
        .header-wrap { display: flex; align-items: flex-start; }
        .elbow-main { 
            width: 100px; height: 100px; background: var(--pink); 
            border-bottom-left-radius: 40px; margin-right: 5px; flex-shrink: 0; 
            display: flex; align-items: flex-end; justify-content: flex-end; padding: 10px; color: black; font-weight: 700;
        }
        .top-bars { flex-grow: 1; display: flex; flex-direction: column; gap: 5px; }
        .bar-top { 
            background: var(--orange); height: 60px; 
            border-bottom-left-radius: 20px; 
            display: flex; align-items: center; justify-content: flex-end;
            padding: 0 20px; color: black; font-size: 28px; font-weight: 700; letter-spacing: 1px;
        }
        .bar-sub { background: var(--blue); height: 15px; width: 80%; border-bottom-left-radius: 10px; }

        /* Middle Content & Sidebar */
        .middle-wrap { display: flex; overflow: hidden; }
        .sidebar { width: 100px; display: flex; flex-direction: column; gap: 5px; margin-right: 15px; flex-shrink: 0;}
        
        .action-btn { 
            height: 45px; border-radius: 0 22px 22px 0; color: black; 
            font-size: 16px; display: flex; align-items: center; justify-content: flex-end; padding-right: 15px; 
            cursor: pointer; transition: background 0.1s; position: relative; overflow: hidden;
            font-weight: 700;
        }
        .action-btn:active { background: white !important; }
        .action-text { position: relative; z-index: 2; }
        
        /* 3-Second Hold Purge Logic */
        .purge-fill {
            position: absolute; left: 0; top: 0; height: 100%; background: rgba(255,255,255,0.6);
            width: 0%; z-index: 1; transition: width 0s; pointer-events: none;
        }
        .action-btn.purging .purge-fill {
            width: 100%; transition: width 3s linear;
        }

        .content-area {
            flex-grow: 1; overflow-y: auto; padding-right: 10px;
            display: flex; flex-direction: column; gap: 15px;
            scrollbar-width: none; 
        }
        .content-area::-webkit-scrollbar { display: none; }

        /* Log Entry Cards */
        .log-entry {
            background: rgba(153, 153, 255, 0.1);
            border-left: 6px solid var(--gold); 
            padding: 15px; border-radius: 0 15px 15px 0;
            display: flex; flex-direction: column;
        }
        .log-meta { color: var(--gold); font-size: 14px; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center;}
        .log-text { color: var(--blue); font-size: 18px; text-transform: none; line-height: 1.4; word-wrap: break-word; font-family: sans-serif;}

        .time-display-btn {
            background: rgba(153, 153, 255, 0.2); border: 1px solid var(--blue); color: white; font-family: 'Oswald', sans-serif;
            padding: 5px 10px; border-radius: 10px; cursor: pointer; font-size: 14px; text-transform: uppercase; font-weight: 500;
        }

        /* Editing & Classifications */
        .edit-textarea {
            width: 100%; min-height: 80px; background: rgba(0,0,0,0.6);
            border: 1px solid var(--orange); color: white; padding: 10px;
            font-family: sans-serif; font-size: 16px; text-transform: none; border-radius: 5px;
            margin-bottom: 10px; outline: none;
        }
        .meta-actions span { cursor: pointer; margin-left: 10px; padding: 2px 5px; }
        .meta-actions span.edit-btn { color: var(--gold); }
        .meta-actions span.del-btn { color: var(--red); }

        /* Recording Interface */
        .record-interface {
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%;
        }
        
        .classification-selector {
            display: flex; gap: 8px; margin-bottom: 30px; flex-wrap: wrap; justify-content: center;
        }
        .class-btn {
            padding: 8px 15px; border-radius: 15px; color: black; cursor: pointer; font-size: 14px; font-weight: 700;
            opacity: 0.5; transition: all 0.2s; border: 2px solid transparent;
        }
        .class-btn.active { opacity: 1; border-color: white; transform: scale(1.05); }

        .mic-button {
            width: 120px; height: 120px; border-radius: 50%; font-family: 'Oswald', sans-serif; font-weight: 700;
            background: var(--red); color: black; font-size: 18px; border: none;
            box-shadow: 0 0 20px rgba(204, 0, 0, 0.5); cursor: pointer;
            display: flex; align-items: center; justify-content: center; text-align: center;
        }
        .mic-button.recording {
            animation: pulse 1s infinite; background: var(--gold); box-shadow: 0 0 30px rgba(255, 204, 102, 0.8);
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        .transcript-box {
            margin-top: 20px; width: 100%; min-height: 100px; font-family: sans-serif;
            background: rgba(0,0,0,0.5); border: 2px solid var(--orange);
            color: white; padding: 15px; border-radius: 10px; text-transform: none;
        }

        /* Bottom Bar */
        .footer-wrap { background: var(--pink); border-top-left-radius: 20px; display: flex; align-items: center; padding: 0 20px; color: black; justify-content: space-between; font-weight: 700; font-size: 14px;}

        /* Modals & Overlays */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(5px);
            display: flex; align-items: center; justify-content: center; z-index: 100;
        }
        .lcars-modal {
            background: var(--dark-blue);
            border: 2px solid var(--blue);
            border-left: 20px solid var(--gold);
            border-radius: 15px;
            padding: 20px; width: 90%; max-width: 400px;
            max-height: 90vh; overflow-y: auto;
            display: flex; flex-direction: column; gap: 15px;
        }
        .modal-header { color: var(--gold); font-size: 22px; border-bottom: 2px solid var(--orange); padding-bottom: 5px; margin-bottom: 5px;}
        
        /* Custom LCARS Sliders */
        .slider-row { display: flex; flex-direction: column; gap: 5px; }
        .slider-label { color: var(--blue); font-size: 16px; display: flex; justify-content: space-between;}
        input[type=range] {
            -webkit-appearance: none; width: 100%; height: 20px;
            background: rgba(153, 153, 255, 0.2); border-radius: 10px; outline: none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 30px; width: 25px;
            background: var(--gold); border: 2px solid var(--orange); border-radius: 5px; cursor: pointer;
        }
        
        .modal-btn {
            background: var(--orange); color: black; padding: 12px; border: none; font-family: 'Oswald', sans-serif;
            border-radius: 15px; font-weight: 700; font-size: 16px; cursor: pointer; text-transform: uppercase;
        }
        .modal-btn.cancel { background: var(--red); }
        .modal-btn.blue { background: var(--blue); }

        .help-text { color: white; font-size: 16px; line-height: 1.5; text-transform: none; font-family: sans-serif;}
        .help-text strong { color: var(--gold); text-transform: uppercase; font-family: 'Oswald', sans-serif;}
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- AUDIO SYNTHESIZER ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            
            if (type === 'click') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(1200, now);
                osc.frequency.exponentialRampToValueAtTime(600, now + 0.1);
                gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'lock') { 
                osc.type = 'square'; osc.frequency.setValueAtTime(800, now);
                osc.frequency.setValueAtTime(1200, now + 0.05); osc.frequency.setValueAtTime(800, now + 0.1);
                gain.gain.setValueAtTime(0.05, now); gain.gain.linearRampToValueAtTime(0, now + 0.15);
                osc.start(now); osc.stop(now + 0.15);
            } else if (type === 'red_alert') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(400, now);
                osc.frequency.linearRampToValueAtTime(800, now + 0.5);
                gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0, now + 1);
                osc.start(now); osc.stop(now + 1);
            }
        }

        // --- SPEECH RECOGNITION SETUP ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
        }

        // --- LOG CLASSIFICATION DATA ---
        const classifications = [
            { id: 'PERSONAL', color: 'var(--pink)' },
            { id: 'OFFICIAL', color: 'var(--red)' },
            { id: 'ENGINEERING', color: 'var(--gold)' },
            { id: 'MEDICAL', color: 'var(--teal)' }
        ];

        function App() {
            // STATE MANAGEMENT
            const [logs, setLogs] = useState(() => JSON.parse(localStorage.getItem('lcars_logs')) || []);
            const [view, setView] = useState('record'); 
            const [isRecording, setIsRecording] = useState(false);
            const [transcript, setTranscript] = useState('');
            const [stardate, setStardate] = useState("00/00/00");
            
            // STATES
            const [activeClass, setActiveClass] = useState('PERSONAL');
            const [editingId, setEditingId] = useState(null);
            const [editText, setEditText] = useState('');

            // HOLD-TO-PURGE STATES
            const [isPurging, setIsPurging] = useState(false);
            const purgeTimerRef = useRef(null);

            // MODAL STATES
            const [showHelp, setShowHelp] = useState(false);
            const [deferredPrompt, setDeferredPrompt] = useState(null);
            const [timePickerData, setTimePickerData] = useState(null); 

            // PWA Install Prompt Capture
            useEffect(() => {
                const handler = (e) => { e.preventDefault(); setDeferredPrompt(e); };
                window.addEventListener('beforeinstallprompt', handler);
                return () => window.removeEventListener('beforeinstallprompt', handler);
            }, []);

            // Calculate MM/DD/YY Stardate
            useEffect(() => {
                const updateStardate = () => {
                    const now = new Date();
                    const mm = String(now.getMonth() + 1).padStart(2, '0');
                    const dd = String(now.getDate()).padStart(2, '0');
                    const yy = String(now.getFullYear()).slice(-2);
                    setStardate(`${mm}/${dd}/${yy}`);
                };
                updateStardate();
                const interval = setInterval(updateStardate, 10000);
                return () => clearInterval(interval);
            }, []);

            // Save logs to local storage
            useEffect(() => {
                localStorage.setItem('lcars_logs', JSON.stringify(logs));
            }, [logs]);

            // BACKGROUND ALARM ENGINE
            useEffect(() => {
                const checkAlarms = setInterval(() => {
                    const now = new Date().getTime();
                    let dataChanged = false;
                    
                    const updatedLogs = logs.map(log => {
                        if (log.alarm && !log.alarmTriggered) {
                            const alarmTime = new Date(log.alarm).getTime();
                            if (now >= alarmTime) {
                                playSound('red_alert'); 
                                if (navigator.vibrate) navigator.vibrate([300, 100, 300]); 
                                if (Notification.permission === "granted" && navigator.serviceWorker.controller) {
                                    navigator.serviceWorker.controller.postMessage({ 
                                        type: 'SHOW_NOTIFICATION', title: `COMM: ${log.type}`, body: `Reminder: ${log.text.substring(0, 30)}...`
                                    });
                                }
                                dataChanged = true;
                                return { ...log, alarmTriggered: true };
                            }
                        }
                        return log;
                    });
                    if (dataChanged) setLogs(updatedLogs);
                }, 10000); 
                return () => clearInterval(checkAlarms);
            }, [logs]);

            // VOICE RECORDING LOGIC
            const toggleRecording = () => {
                playSound('click');
                if (!recognition) return alert("Speech recognition not supported in this browser.");

                if (isRecording) {
                    recognition.stop();
                    setIsRecording(false);
                    if (navigator.vibrate) navigator.vibrate(50);
                    
                    if (transcript.trim()) {
                        const newLog = {
                            id: Date.now(),
                            text: transcript,
                            date: new Date().toLocaleString(),
                            sd: stardate,
                            alarm: null,
                            alarmTriggered: false,
                            type: activeClass 
                        };
                        setLogs([newLog, ...logs]);
                        setTranscript('');
                        setView('logs');
                        playSound('lock');
                    }
                } else {
                    setTranscript('');
                    recognition.start();
                    setIsRecording(true);
                    if (navigator.vibrate) navigator.vibrate([50, 50, 50]);
                    
                    recognition.onresult = (event) => {
                        let current = '';
                        for (let i = event.resultIndex; i < event.results.length; ++i) {
                            current += event.results[i][0].transcript;
                        }
                        setTranscript(current);
                    };
                    
                    recognition.onerror = (event) => {
                        console.error(event.error);
                        setIsRecording(false);
                    };
                    
                    recognition.onend = () => {
                        if (isRecording) recognition.start(); 
                    };
                }
            };

            // LOG DELETION & EDITING
            const deleteLog = (id) => {
                playSound('click');
                setLogs(logs.filter(log => log.id !== id));
            }

            const startEditing = (log) => {
                playSound('click');
                setEditingId(log.id);
                setEditText(log.text);
            };

            const cancelEdit = () => {
                playSound('click');
                setEditingId(null);
                setEditText('');
            };

            const saveEdit = (id) => {
                playSound('click');
                setLogs(logs.map(log => log.id === id ? { ...log, text: editText } : log));
                setEditingId(null);
                setEditText('');
            };

            // 3-SECOND PURGE LOGIC
            const startPurgeHold = () => {
                playSound('click');
                setIsPurging(true);
                
                purgeTimerRef.current = setTimeout(() => {
                    playSound('red_alert');
                    setLogs([]); 
                    setIsPurging(false);
                    if (navigator.vibrate) navigator.vibrate([200, 100, 500]);
                }, 3000);
            };

            const stopPurgeHold = () => {
                setIsPurging(false);
                clearTimeout(purgeTimerRef.current);
            };

            // CUSTOM DATE/TIME PICKER LOGIC
            const openTimePicker = (log) => {
                playSound('click');
                let d = new Date(); 
                if (log.alarm) {
                    d = new Date(log.alarm); 
                }
                setTimePickerData({ 
                    id: log.id, 
                    month: d.getMonth() + 1, 
                    day: d.getDate(), 
                    year: d.getFullYear(),
                    hour: d.getHours(), 
                    minute: d.getMinutes() 
                });
            };

            const saveTime = () => {
                playSound('click');
                const d = new Date(
                    timePickerData.year, 
                    timePickerData.month - 1, 
                    timePickerData.day, 
                    timePickerData.hour, 
                    timePickerData.minute
                );
                setLogs(logs.map(log => log.id === timePickerData.id ? { ...log, alarm: d.toISOString(), alarmTriggered: false } : log));
                setTimePickerData(null);
            };

            const formatAlarmDisplay = (isoString) => {
                if (!isoString) return 'NOT SET';
                const d = new Date(isoString);
                return d.toLocaleString([], { month: 'numeric', day: 'numeric', year: '2-digit', hour: '2-digit', minute: '2-digit' });
            };

            const installApp = async () => {
                playSound('click');
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    if (outcome === 'accepted') setDeferredPrompt(null);
                }
            };

            // UI RENDERING
            return (
                <div className="lcars-container">
                    
                    {/* HELP MODAL */}
                    {showHelp && (
                        <div className="modal-overlay">
                            <div className="lcars-modal">
                                <div className="modal-header">SYSTEM PROTOCOLS</div>
                                <div className="help-text">
                                    <p><strong>RECORD:</strong> Select a classification (Personal, Medical, etc.) and tap ENGAGE COMM to dictate your log.</p>
                                    <p><strong>DATABASE:</strong> Review logs. Use EDIT to manually correct translation errors or DEL to purge.</p>
                                    <p><strong>ALARMS:</strong> Set a specific date and time on a log to receive subspace push notifications.</p>
                                </div>
                                <div style={{display: 'flex', flexDirection: 'column', gap: '10px', marginTop: '10px'}}>
                                    {deferredPrompt && (
                                        <button className="modal-btn blue" onClick={installApp}>INSTALL PWA TO DEVICE</button>
                                    )}
                                    <button className="modal-btn blue" onClick={() => { playSound('click'); Notification.requestPermission(); }}>ENABLE NOTIFICATIONS</button>
                                    <button className="modal-btn cancel" onClick={() => { playSound('click'); setShowHelp(false); }}>CLOSE TERMINAL</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* TEMPORAL DATE/TIME PICKER MODAL */}
                    {timePickerData && (
                        <div className="modal-overlay">
                            <div className="lcars-modal">
                                <div className="modal-header">TEMPORAL SETTINGS</div>
                                
                                <div className="slider-row">
                                    <div className="slider-label"><span>MONTH:</span> <span>{String(timePickerData.month).padStart(2, '0')}</span></div>
                                    <input type="range" min="1" max="12" value={timePickerData.month} onChange={e => setTimePickerData({...timePickerData, month: parseInt(e.target.value)})} />
                                </div>

                                <div className="slider-row">
                                    <div className="slider-label"><span>DAY:</span> <span>{String(timePickerData.day).padStart(2, '0')}</span></div>
                                    <input type="range" min="1" max="31" value={timePickerData.day} onChange={e => setTimePickerData({...timePickerData, day: parseInt(e.target.value)})} />
                                </div>

                                <div className="slider-row">
                                    <div className="slider-label"><span>YEAR:</span> <span>{timePickerData.year}</span></div>
                                    <input type="range" min="2024" max="2030" value={timePickerData.year} onChange={e => setTimePickerData({...timePickerData, year: parseInt(e.target.value)})} />
                                </div>
                                
                                <div className="slider-row" style={{marginTop: '10px'}}>
                                    <div className="slider-label"><span>HOUR:</span> <span>{String(timePickerData.hour).padStart(2, '0')}</span></div>
                                    <input type="range" min="0" max="23" value={timePickerData.hour} onChange={e => setTimePickerData({...timePickerData, hour: parseInt(e.target.value)})} />
                                </div>
                                
                                <div className="slider-row">
                                    <div className="slider-label"><span>MINUTE:</span> <span>{String(timePickerData.minute).padStart(2, '0')}</span></div>
                                    <input type="range" min="0" max="59" value={timePickerData.minute} onChange={e => setTimePickerData({...timePickerData, minute: parseInt(e.target.value)})} />
                                </div>

                                <div style={{display: 'flex', gap: '10px', marginTop: '15px'}}>
                                    <button className="modal-btn" style={{flex: 1}} onClick={saveTime}>ENGAGE</button>
                                    <button className="modal-btn cancel" style={{flex: 1}} onClick={() => { playSound('click'); setTimePickerData(null); }}>CANCEL</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="header-wrap">
                        <div className="elbow-main">01</div>
                        <div className="top-bars">
                            <div className="bar-top">
                                <span>CAPTAIN'S LOG</span>
                            </div>
                            <div className="bar-sub"></div>
                        </div>
                    </div>

                    <div className="middle-wrap">
                        <div className="sidebar">
                            <div className="action-btn" style={{background: 'var(--orange)'}} onClick={() => { playSound('click'); setView('record'); }}>
                                <span className="action-text">RECORD</span>
                            </div>
                            <div className="action-btn" style={{background: 'var(--blue)'}} onClick={() => { playSound('click'); setView('logs'); }}>
                                <span className="action-text">DATABASE</span>
                            </div>
                            <div className="action-btn" style={{background: 'var(--pink)'}} onClick={() => { playSound('click'); setShowHelp(true); }}>
                                <span className="action-text">SYS HELP</span>
                            </div>
                            
                            <div style={{flexGrow: 1}}></div>
                            
                            {/* 3-SECOND HOLD PURGE BUTTON */}
                            <div className={`action-btn ${isPurging ? 'purging' : ''}`} style={{background: 'var(--red)'}}
                                 onMouseDown={startPurgeHold} onMouseUp={stopPurgeHold} onMouseLeave={stopPurgeHold}
                                 onTouchStart={startPurgeHold} onTouchEnd={stopPurgeHold} onContextMenu={(e) => e.preventDefault()}>
                                <div className="purge-fill"></div>
                                <span className="action-text">{isPurging ? 'HOLDING...' : 'PURGE'}</span>
                            </div>
                        </div>

                        <div className="content-area">
                            {view === 'record' ? (
                                <div className="record-interface">
                                    
                                    <div style={{color: 'var(--blue)', marginBottom: '10px', fontSize: '14px', fontFamily: 'sans-serif'}}>SELECT CLASSIFICATION:</div>
                                    <div className="classification-selector">
                                        {classifications.map(c => (
                                            <div key={c.id} 
                                                 className={`class-btn ${activeClass === c.id ? 'active' : ''}`}
                                                 style={{ background: c.color }}
                                                 onClick={() => { playSound('click'); setActiveClass(c.id); }}>
                                                {c.id}
                                            </div>
                                        ))}
                                    </div>

                                    <button className={`mic-button ${isRecording ? 'recording' : ''}`} onClick={toggleRecording}>
                                        {isRecording ? "RECORDING... TAP TO SAVE" : "ENGAGE COMM"}
                                    </button>
                                    {isRecording && (
                                        <div className="transcript-box">
                                            {transcript || "Listening..."}
                                        </div>
                                    )}
                                </div>
                            ) : (
                                logs.length === 0 ? <div style={{color: 'var(--blue)', fontFamily: 'sans-serif'}}>NO LOGS RECORDED.</div> :
                                logs.map(log => {
                                    const logColor = classifications.find(c => c.id === log.type)?.color || 'var(--pink)';
                                    
                                    return (
                                        <div key={log.id} className="log-entry" style={{ borderLeftColor: logColor }}>
                                            <div className="log-meta">
                                                <span>SD {log.sd} // {log.type || 'PERSONAL'}</span>
                                                <div className="meta-actions">
                                                    {editingId !== log.id && <span className="edit-btn" onClick={() => startEditing(log)}>EDIT</span>}
                                                    <span className="del-btn" onClick={() => deleteLog(log.id)}>DEL</span>
                                                </div>
                                            </div>
                                            
                                            {/* EDIT MODE OR DISPLAY MODE */}
                                            {editingId === log.id ? (
                                                <div style={{marginTop: '10px'}}>
                                                    <textarea 
                                                        className="edit-textarea" 
                                                        value={editText} 
                                                        onChange={e => setEditText(e.target.value)} 
                                                    />
                                                    <div style={{display: 'flex', gap: '10px'}}>
                                                        <button className="time-display-btn" style={{borderColor: 'var(--gold)'}} onClick={() => saveEdit(log.id)}>SAVE</button>
                                                        <button className="time-display-btn" style={{borderColor: 'var(--red)'}} onClick={cancelEdit}>CANCEL</button>
                                                    </div>
                                                </div>
                                            ) : (
                                                <div className="log-text">{log.text}</div>
                                            )}

                                            {/* ALARM BAR */}
                                            {editingId !== log.id && (
                                                <div style={{marginTop: '15px', display: 'flex', alignItems: 'center', gap: '10px'}}>
                                                    <span style={{fontSize: '14px', color: 'var(--orange)'}}>ALARM:</span>
                                                    <button className="time-display-btn" onClick={() => openTimePicker(log)}>
                                                        {formatAlarmDisplay(log.alarm)}
                                                    </button>
                                                </div>
                                            )}
                                        </div>
                                    );
                                })
                            )}
                        </div>
                    </div>

                    <div className="footer-wrap">
                        <span>CURRENT STARDATE: {stardate}</span>
                        <span>SYSTEM NOMINAL</span>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // --- SERVICE WORKER REGISTRATION ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    console.log('LCARS Service Worker Registered');
                }).catch(err => console.log('LCARS SW Error:', err));
            });
        }
    </script>
</body>
</html>
