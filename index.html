<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Captain's Log</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* LCARS Color Palette & Reset */
        :root { 
            --orange: #ff9900; --pink: #cc99cc; --blue: #9999ff; 
            --gold: #ffcc66; --red: #cc0000; --dark-blue: #08081a;
            --lcars-bg: #000000;
        }
        
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        input, textarea { user-select: text; -webkit-user-select: text; }

        body { 
            margin: 0; padding: 0; background: var(--lcars-bg); 
            font-family: 'Arial Narrow', Arial, sans-serif; 
            font-weight: bold; text-transform: uppercase; color: white; 
            overflow: hidden; touch-action: none;
        }

        #root { height: 100vh; display: flex; flex-direction: column; }

        /* LCARS Main Layout */
        .lcars-container {
            display: grid; 
            grid-template-rows: 100px 1fr 40px;
            height: 100%; width: 100%; padding: 10px; gap: 10px;
        }

        /* Header / Top Elbow */
        .header-wrap { display: flex; align-items: flex-start; }
        .elbow-main { 
            width: 100px; height: 100px; background: var(--pink); 
            border-bottom-left-radius: 40px; margin-right: 5px; flex-shrink: 0; 
            display: flex; align-items: flex-end; justify-content: flex-end; padding: 10px; color: black;
        }
        .top-bars { flex-grow: 1; display: flex; flex-direction: column; gap: 5px; }
        .bar-top { 
            background: var(--orange); height: 60px; 
            border-bottom-left-radius: 20px; 
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; color: black; font-size: 24px; letter-spacing: 2px;
        }
        .bar-sub { background: var(--blue); height: 15px; width: 80%; border-bottom-left-radius: 10px; }

        /* Middle Content & Sidebar */
        .middle-wrap { display: flex; overflow: hidden; }
        .sidebar { width: 100px; display: flex; flex-direction: column; gap: 5px; margin-right: 15px; flex-shrink: 0;}
        
        .action-btn { 
            height: 45px; border-radius: 0 22px 22px 0; color: black; 
            font-size: 14px; display: flex; align-items: center; justify-content: flex-end; padding-right: 15px; 
            cursor: pointer; transition: background 0.1s;
        }
        .action-btn:active { background: white !important; }
        
        .content-area {
            flex-grow: 1; overflow-y: auto; padding-right: 10px;
            display: flex; flex-direction: column; gap: 15px;
            scrollbar-width: none; 
        }
        .content-area::-webkit-scrollbar { display: none; }

        /* Log Entry Cards */
        .log-entry {
            background: rgba(153, 153, 255, 0.1);
            border-left: 4px solid var(--gold);
            padding: 15px; border-radius: 0 15px 15px 0;
        }
        .log-meta { color: var(--gold); font-size: 12px; margin-bottom: 5px; display: flex; justify-content: space-between; }
        .log-text { color: var(--blue); font-size: 16px; text-transform: none; line-height: 1.4; word-wrap: break-word; }

        .time-display-btn {
            background: rgba(153, 153, 255, 0.2); border: 1px solid var(--blue); color: white;
            padding: 5px 10px; border-radius: 10px; cursor: pointer; font-size: 14px;
        }

        /* Recording Interface */
        .record-interface {
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%;
        }
        .mic-button {
            width: 120px; height: 120px; border-radius: 50%;
            background: var(--red); color: black; font-size: 18px; border: none;
            box-shadow: 0 0 20px rgba(204, 0, 0, 0.5); cursor: pointer;
            display: flex; align-items: center; justify-content: center; text-align: center;
        }
        .mic-button.recording {
            animation: pulse 1s infinite; background: var(--gold); box-shadow: 0 0 30px rgba(255, 204, 102, 0.8);
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        .transcript-box {
            margin-top: 20px; width: 100%; min-height: 100px;
            background: rgba(0,0,0,0.5); border: 2px solid var(--orange);
            color: white; padding: 15px; border-radius: 10px; text-transform: none;
        }

        /* Bottom Bar */
        .footer-wrap { background: var(--pink); border-top-left-radius: 20px; display: flex; align-items: center; padding: 0 20px; color: black; justify-content: space-between;}

        /* Modals & Overlays */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(5px);
            display: flex; align-items: center; justify-content: center; z-index: 100;
        }
        .lcars-modal {
            background: var(--dark-blue);
            border: 2px solid var(--blue);
            border-left: 20px solid var(--gold);
            border-radius: 15px;
            padding: 20px; width: 90%; max-width: 400px;
            display: flex; flex-direction: column; gap: 20px;
        }
        .modal-header { color: var(--gold); font-size: 22px; border-bottom: 2px solid var(--orange); padding-bottom: 5px; }
        
        /* Custom LCARS Sliders */
        .slider-row { display: flex; flex-direction: column; gap: 5px; }
        .slider-label { color: var(--blue); font-size: 14px; }
        input[type=range] {
            -webkit-appearance: none; width: 100%; height: 20px;
            background: rgba(153, 153, 255, 0.2); border-radius: 10px; outline: none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 30px; width: 25px;
            background: var(--gold); border: 2px solid var(--orange); border-radius: 5px; cursor: pointer;
        }
        
        .modal-btn {
            background: var(--orange); color: black; padding: 12px; border: none;
            border-radius: 15px; font-weight: bold; font-size: 14px; cursor: pointer; text-transform: uppercase;
        }
        .modal-btn.cancel { background: var(--red); }
        .modal-btn.blue { background: var(--blue); }

        .help-text { color: white; font-size: 14px; line-height: 1.5; text-transform: none; }
        .help-text strong { color: var(--gold); text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- AUDIO SYNTHESIZER ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            
            if (type === 'click') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(1200, now);
                osc.frequency.exponentialRampToValueAtTime(600, now + 0.1);
                gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'lock') { 
                osc.type = 'square'; osc.frequency.setValueAtTime(800, now);
                osc.frequency.setValueAtTime(1200, now + 0.05); osc.frequency.setValueAtTime(800, now + 0.1);
                gain.gain.setValueAtTime(0.05, now); gain.gain.linearRampToValueAtTime(0, now + 0.15);
                osc.start(now); osc.stop(now + 0.15);
            } else if (type === 'red_alert') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(400, now);
                osc.frequency.linearRampToValueAtTime(800, now + 0.5);
                gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0, now + 1);
                osc.start(now); osc.stop(now + 1);
            }
        }

        // --- SPEECH RECOGNITION SETUP ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
        }

        function App() {
            // STATE MANAGEMENT
            const [logs, setLogs] = useState(() => JSON.parse(localStorage.getItem('lcars_logs')) || []);
            const [view, setView] = useState('record'); 
            const [isRecording, setIsRecording] = useState(false);
            const [transcript, setTranscript] = useState('');
            const [stardate, setStardate] = useState(0);
            
            // MODAL STATES
            const [showHelp, setShowHelp] = useState(false);
            const [deferredPrompt, setDeferredPrompt] = useState(null);
            const [timePickerData, setTimePickerData] = useState(null); // { id, hour, minute }

            // PWA Install Prompt Capture
            useEffect(() => {
                const handler = (e) => {
                    e.preventDefault();
                    setDeferredPrompt(e);
                };
                window.addEventListener('beforeinstallprompt', handler);
                return () => window.removeEventListener('beforeinstallprompt', handler);
            }, []);

            // Calculate mock stardate
            useEffect(() => {
                const updateStardate = () => {
                    const now = new Date();
                    setStardate((now.getFullYear() - 2000) * 1000 + Math.floor(now.getTime() % 31536000000 / 31536000));
                };
                updateStardate();
                const interval = setInterval(updateStardate, 10000);
                return () => clearInterval(interval);
            }, []);

            // Save logs to local storage
            useEffect(() => {
                localStorage.setItem('lcars_logs', JSON.stringify(logs));
            }, [logs]);

            // BACKGROUND ALARM ENGINE
            useEffect(() => {
                const checkAlarms = setInterval(() => {
                    const now = new Date();
                    const currentTime = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
                    let dataChanged = false;
                    
                    const updatedLogs = logs.map(log => {
                        if (log.alarm === currentTime && !log.alarmTriggered) {
                            playSound('red_alert'); 
                            if (navigator.vibrate) navigator.vibrate([300, 100, 300]); 
                            if (Notification.permission === "granted" && navigator.serviceWorker.controller) {
                                navigator.serviceWorker.controller.postMessage({ 
                                    type: 'SHOW_NOTIFICATION', title: 'COMM INCOMING', body: `Reminder: ${log.text.substring(0, 30)}...`
                                });
                            }
                            dataChanged = true;
                            return { ...log, alarmTriggered: true };
                        }
                        return log;
                    });
                    if (dataChanged) setLogs(updatedLogs);
                }, 10000);
                return () => clearInterval(checkAlarms);
            }, [logs]);

            // VOICE RECORDING LOGIC
            const toggleRecording = () => {
                playSound('click');
                if (!recognition) return alert("Speech recognition not supported in this browser.");

                if (isRecording) {
                    recognition.stop();
                    setIsRecording(false);
                    if (navigator.vibrate) navigator.vibrate(50);
                    
                    if (transcript.trim()) {
                        const newLog = {
                            id: Date.now(),
                            text: transcript,
                            date: new Date().toLocaleString(),
                            sd: stardate,
                            alarm: null,
                            alarmTriggered: false
                        };
                        setLogs([newLog, ...logs]);
                        setTranscript('');
                        setView('logs');
                        playSound('lock');
                    }
                } else {
                    setTranscript('');
                    recognition.start();
                    setIsRecording(true);
                    if (navigator.vibrate) navigator.vibrate([50, 50, 50]);
                    
                    recognition.onresult = (event) => {
                        let current = '';
                        for (let i = event.resultIndex; i < event.results.length; ++i) {
                            current += event.results[i][0].transcript;
                        }
                        setTranscript(current);
                    };
                    
                    recognition.onerror = (event) => {
                        console.error(event.error);
                        setIsRecording(false);
                    };
                    
                    recognition.onend = () => {
                        if (isRecording) recognition.start(); 
                    };
                }
            };

            const deleteLog = (id) => {
                playSound('click');
                setLogs(logs.filter(log => log.id !== id));
            }

            // CUSTOM TIME PICKER LOGIC
            const openTimePicker = (log) => {
                playSound('click');
                let h = 12; let m = 0;
                if (log.alarm) {
                    const parts = log.alarm.split(':');
                    h = parseInt(parts[0], 10);
                    m = parseInt(parts[1], 10);
                } else {
                    const d = new Date();
                    h = d.getHours();
                    m = d.getMinutes();
                }
                setTimePickerData({ id: log.id, hour: h, minute: m });
            };

            const saveTime = () => {
                playSound('click');
                const formattedTime = `${String(timePickerData.hour).padStart(2, '0')}:${String(timePickerData.minute).padStart(2, '0')}`;
                setLogs(logs.map(log => log.id === timePickerData.id ? { ...log, alarm: formattedTime, alarmTriggered: false } : log));
                setTimePickerData(null);
            };

            const installApp = async () => {
                playSound('click');
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    if (outcome === 'accepted') setDeferredPrompt(null);
                }
            };

            // UI RENDERING
            return (
                <div className="lcars-container">
                    
                    {/* HELP MODAL */}
                    {showHelp && (
                        <div className="modal-overlay">
                            <div className="lcars-modal">
                                <div className="modal-header">SYSTEM PROTOCOLS</div>
                                <div className="help-text">
                                    <p><strong>RECORD:</strong> Tap ENGAGE COMM to activate the universal translator and dictate logs.</p>
                                    <p><strong>DATABASE:</strong> Review personal logs and configure temporal parameters.</p>
                                    <p><strong>ALARMS:</strong> Set a specific time on a log. The system will ping via subspace (OS notifications) when the time is reached.</p>
                                </div>
                                <div style={{display: 'flex', flexDirection: 'column', gap: '10px', marginTop: '10px'}}>
                                    {deferredPrompt && (
                                        <button className="modal-btn blue" onClick={installApp}>INSTALL PWA TO DEVICE</button>
                                    )}
                                    <button className="modal-btn blue" onClick={() => { playSound('click'); Notification.requestPermission(); }}>ENABLE NOTIFICATIONS</button>
                                    <button className="modal-btn cancel" onClick={() => { playSound('click'); setShowHelp(false); }}>CLOSE TERMINAL</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* TIME PICKER MODAL */}
                    {timePickerData && (
                        <div className="modal-overlay">
                            <div className="lcars-modal">
                                <div className="modal-header">TEMPORAL SETTINGS</div>
                                
                                <div className="slider-row">
                                    <div className="slider-label">HOUR: {String(timePickerData.hour).padStart(2, '0')}</div>
                                    <input type="range" min="0" max="23" value={timePickerData.hour} onChange={e => setTimePickerData({...timePickerData, hour: parseInt(e.target.value)})} />
                                </div>
                                
                                <div className="slider-row">
                                    <div className="slider-label">MINUTE: {String(timePickerData.minute).padStart(2, '0')}</div>
                                    <input type="range" min="0" max="59" value={timePickerData.minute} onChange={e => setTimePickerData({...timePickerData, minute: parseInt(e.target.value)})} />
                                </div>

                                <div style={{display: 'flex', gap: '10px', marginTop: '10px'}}>
                                    <button className="modal-btn" style={{flex: 1}} onClick={saveTime}>ENGAGE</button>
                                    <button className="modal-btn cancel" style={{flex: 1}} onClick={() => { playSound('click'); setTimePickerData(null); }}>CANCEL</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="header-wrap">
                        <div className="elbow-main">01</div>
                        <div className="top-bars">
                            <div className="bar-top">
                                <span>CAPTAIN'S LOG</span>
                                <span>SD {stardate}</span>
                            </div>
                            <div className="bar-sub"></div>
                        </div>
                    </div>

                    <div className="middle-wrap">
                        <div className="sidebar">
                            <div className="action-btn" style={{background: 'var(--orange)'}} onClick={() => { playSound('click'); setView('record'); }}>RECORD</div>
                            <div className="action-btn" style={{background: 'var(--blue)'}} onClick={() => { playSound('click'); setView('logs'); }}>DATABASE</div>
                            <div className="action-btn" style={{background: 'var(--pink)'}} onClick={() => { playSound('click'); setShowHelp(true); }}>SYS HELP</div>
                            <div style={{flexGrow: 1}}></div>
                            <div className="action-btn" style={{background: 'var(--red)'}} onClick={() => { playSound('click'); if(confirm('Purge databanks?')) setLogs([]); }}>PURGE</div>
                        </div>

                        <div className="content-area">
                            {view === 'record' ? (
                                <div className="record-interface">
                                    <button className={`mic-button ${isRecording ? 'recording' : ''}`} onClick={toggleRecording}>
                                        {isRecording ? "RECORDING... TAP TO SAVE" : "ENGAGE COMM"}
                                    </button>
                                    {isRecording && (
                                        <div className="transcript-box">
                                            {transcript || "Listening..."}
                                        </div>
                                    )}
                                </div>
                            ) : (
                                logs.length === 0 ? <div style={{color: 'var(--blue)'}}>NO LOGS RECORDED.</div> :
                                logs.map(log => (
                                    <div key={log.id} className="log-entry">
                                        <div className="log-meta">
                                            <span>STARDATE {log.sd}</span>
                                            <span style={{cursor: 'pointer', color: 'var(--red)'}} onClick={() => deleteLog(log.id)}>DELETE</span>
                                        </div>
                                        <div className="log-text">{log.text}</div>
                                        <div style={{marginTop: '15px', display: 'flex', alignItems: 'center', gap: '10px'}}>
                                            <span style={{fontSize: '12px', color: 'var(--orange)'}}>ALARM:</span>
                                            <button className="time-display-btn" onClick={() => openTimePicker(log)}>
                                                {log.alarm ? log.alarm : 'NOT SET'}
                                            </button>
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>
                    </div>

                    <div className="footer-wrap">
                        <span>FEDERATION NETWORK OFFLINE</span>
                        <span>SYSTEM NOMINAL</span>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // --- SERVICE WORKER REGISTRATION ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    console.log('LCARS Service Worker Registered');
                }).catch(err => console.log('LCARS SW Error:', err));
            });
        }
    </script>
</body>
</html>
